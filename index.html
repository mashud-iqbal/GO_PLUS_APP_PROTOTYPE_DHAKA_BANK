<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dhaka Bank Go Plus 2026 | Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dhaka Bank Branding */
            --db-blue: #004da3; 
            --db-light: #2596be; 
            --go-red: #dc222a; 
            --bg-app: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
        }

        .dark-mode { 
            --bg-app: #0f172a; 
            --card-bg: #1e293b; 
            --text-primary: #f8fafc; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #cbd5e1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* The Phone Frame */
        .app-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            max-height: 850px; 
            background: var(--bg-app); 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        @media (min-width: 768px) { 
            .app-container { 
                border: 12px solid #1e293b; 
                border-radius: 48px; 
                box-shadow: 0 50px 100px -20px rgba(0,0,0,0.4); 
            } 
        }

        /* The Modular Stage */
        #main-stage { 
            flex: 1; 
            overflow-y: auto; 
            overflow-x: hidden; 
            position: relative; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Bottom Nav */
        .bottom-nav { 
            height: 85px; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 0 10px 15px 10px; 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            z-index: 100;
        }
        
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            color: #94a3b8; 
            font-weight: 700; 
            transition: all 0.2s; 
            background: none; 
            border: none; 
            cursor: pointer;
        }
        
        .nav-item.active { color: var(--db-blue); }
        
        .nav-item.center-btn { 
            background: var(--go-red); 
            color: white; 
            width: 60px; 
            height: 60px; 
            border-radius: 22px; 
            margin-top: -45px; 
            box-shadow: 0 10px 20px rgba(220, 34, 42, 0.3);
            justify-content: center;
        }

        /* Standard Animations */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- Persistent Status Bar -->
        <div class="h-10 px-8 flex justify-between items-center text-slate-400 font-bold text-[10px] absolute w-full z-[101] pointer-events-none">
            <span id="system-time">9:41 AM</span>
            <div class="flex gap-1.5">
                <i data-lucide="signal" size="12"></i>
                <i data-lucide="wifi" size="12"></i>
                <i data-lucide="battery-full" size="12"></i>
            </div>
        </div>

        <!-- MAIN STAGE (Modules render here) -->
        <main id="main-stage" class="no-scrollbar h-full">
            <!-- Loading indicator before first module -->
            <div class="flex items-center justify-center h-full">
                <div class="w-8 h-8 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
            </div>
        </main>

        <!-- PERSISTENT BOTTOM NAVIGATION -->
        <nav id="bottom-nav" class="bottom-nav hidden">
            <button onclick="Core.navigate('home')" class="nav-item" data-page="home">
                <i data-lucide="home" size="22"></i><span class="text-[9px]">Home</span>
            </button>
            <button onclick="Core.navigate('my-dbl')" class="nav-item" data-page="my-dbl">
                <i data-lucide="activity" size="22"></i><span class="text-[9px]">My DBL</span>
            </button>
            
            <!-- Unified Payment Hub Trigger -->
            <button onclick="Core.navigate('pay-hub')" class="nav-item center-btn" data-page="pay-hub">
				<i data-lucide="arrow-left-right" size="26"></i>
			</button>
            
            <button onclick="Core.navigate('cards')" class="nav-item" data-page="cards">
                <i data-lucide="credit-card" size="22"></i><span class="text-[9px]">Cards</span>
            </button>
            <button onclick="Core.navigate('payments')" class="nav-item" data-page="payments">
                <i data-lucide="wallet" size="22"></i><span class="text-[9px]">Payments</span>
            </button>
        </nav>
    </div>

    <script>
        /** * CORE REGISTRY
         * This stores the functional code for M0-M10.
         */
        const Registry = {
            auth: null,      // M0 & M1
            home: null,      // M2
            'pay-hub': null, // M3
            'my-dbl': null,  // M4
            cards: null,     // M5
            product: null,   // M6
            payments: null,  // M7
            account: null,   // M8
            profile: null,   // M9
            search: null     // M10
        };

        /** * CORE ENGINE LOGIC
         */
        const Core = {
            state: { 
                lang: 'EN', 
                theme: 'light', 
                isLoggedIn: false,
                user: { name: "M. Mashud Iqbal", id: "9902" }
            },
            
            currentPage: 'auth',

            // Navigation method to swap modules
            navigate: function(pageId) {
                this.currentPage = pageId;
                this.render();
            },

            // Global render cycle
            render: function() {
                const stage = document.getElementById('main-stage');
                const nav = document.getElementById('bottom-nav');
                const appFrame = document.getElementById('app');
                
                // 1. Manage Navigation Visibility
                const noNavPages = ['auth', 'splash', 'onboarding'];
                nav.classList.toggle('hidden', noNavPages.includes(this.currentPage));

                // 2. Fetch Module from Registry
                const module = Registry[this.currentPage];
                
                if (module && module.render) {
                    stage.innerHTML = `<div class="fade-in h-full">${module.render()}</div>`;
                    // Run module-specific initialization (event listeners, sliders, etc.)
                    if (module.init) module.init(); 
                } else {
                    stage.innerHTML = `
                        <div class="p-10 text-center pt-40 text-slate-300">
                            <i data-lucide="construction" class="mx-auto mb-4 opacity-20" size="48"></i>
                            <h2 class="font-black uppercase tracking-widest text-sm">Module Not Linked</h2>
                            <p class="text-[10px] mt-2 font-bold">[${this.currentPage}]</p>
                        </div>`;
                }

                // 3. Update UI Utilities
                lucide.createIcons();
                this.updateActiveNav();
            },

            updateActiveNav: function() {
                document.querySelectorAll('.nav-item').forEach(el => {
                    const page = el.getAttribute('data-page');
                    el.classList.toggle('active', page === this.currentPage);
                });
            },

            toggleLanguage: function() {
                this.state.lang = this.state.lang === 'EN' ? 'BN' : 'EN';
                this.render();
            }
        };

        // --- MODULE INJECTION REGISTRY ---
        // (This is where you will paste the M0, M1, M2... code I provide)

/**
 * M0 & M1: REFINED AUTH MODULE
 * Features: Biometric-Integrated Login, 6-Digit PIN, Multi-channel Onboarding, Forgot PIN logic.
 * Branding: Dhaka Bank Blue (#004da3) - High Visibility Focus.
 */
Registry.auth = {
    state: {
        view: 'splash', // splash | pre-login | registration | login | login-pin | forgot-pin
        failedAttempts: 0,
        pin: ""
    },

    // View Switcher
    switch: function(v) {
        this.state.view = v;
        this.state.pin = ""; // Clear PIN buffer on view switch
        Core.render();
    },

    init: function() {
        if (this.state.view === 'splash') {
            setTimeout(() => {
                if (this.state.view === 'splash') this.switch('pre-login');
            }, 2500);
        }
    },

    render: function() {
        const L = this.content[Core.state.lang];
        
        let content = "";
        switch(this.state.view) {
            case 'splash': content = this.viewSplash(); break;
            case 'pre-login': content = this.viewPreLogin(L); break;
            case 'registration': content = this.viewRegistration(L); break;
            case 'login': content = this.viewLogin(L); break;
            case 'login-pin': content = this.viewLoginPIN(L); break;
            case 'forgot-pin': content = this.viewForgotPIN(L); break;
            default: content = this.viewPreLogin(L);
        }

        return `
            <div class="h-full flex flex-col relative bg-white">
                ${content}
            </div>
        `;
    },

    // 1. Splash Screen (Focus on Safety and Security)
    viewSplash: function() {
        return `
            <div class="flex-1 flex flex-col items-center justify-between py-24 fade-in bg-white">
                <div class="mt-10 flex flex-col items-center">
                    <div class="w-28 h-28 bg-white shadow-xl rounded-[2.5rem] flex items-center justify-center mb-6">
                        <img src="https://i.ibb.co/20sJrF9b/go-plus-app.webp" class="h-20 w-20" />
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] text-[#004da3] opacity-80">Safe • Secure • Seamless</p>
                </div>
                
                <div class="flex flex-col items-center mb-10 w-full px-20 text-center">
                    <img src="https://i.ibb.co/xKFq0Jhn/Logo-of-Dhaka-Bank-svg.png" class="h-10 mb-8" />
                    <div class="w-32 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-[#004da3] w-full animate-progress"></div>
                    </div>
                </div>
            </div>`;
    },

    // 2. Pre-Login (Messaging: Convenience)
    viewPreLogin: function(L) {
        return `
            <div class="h-full flex flex-col p-8 fade-in bg-white">
                <div class="flex justify-end pt-4">
                    <button onclick="Core.toggleLanguage()" class="px-5 py-2 border-2 border-slate-100 rounded-2xl text-[10px] font-black text-[#004da3] uppercase tracking-widest active:bg-slate-50 transition-all">
                        ${Core.state.lang === 'EN' ? 'বাংলা' : 'ENGLISH'}
                    </button>
                </div>
                <div class="flex-1 flex flex-col items-center justify-center text-center">
                    <div class="w-24 h-24 bg-white shadow-2xl rounded-[2.5rem] flex items-center justify-center mb-8 ring-8 ring-blue-50/50">
                        <img src="https://i.ibb.co/20sJrF9b/go-plus-app.webp" class="h-16 w-16" />
                    </div>
                    <h2 class="text-3xl font-black text-slate-900 leading-tight tracking-tighter">${L.welcome}</h2>
                    <p class="text-sm text-slate-500 mt-3 font-semibold leading-relaxed px-4">${L.subWelcome}</p>
                </div>
                <div class="space-y-4 mb-10">
                    <button onclick="Registry.auth.switch('login')" class="w-full bg-[#004da3] text-white py-5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] text-[11px] shadow-xl shadow-blue-200 active:scale-95 transition-all">${L.loginBtn}</button>
                    <button onclick="Registry.auth.switch('registration')" class="w-full border-2 border-slate-200 text-slate-600 py-5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all">${L.regBtn}</button>
                </div>
                <p class="text-center text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Secured Banking by Dhaka Bank</p>
            </div>`;
    },

    // 3. Login Page (High Visibility and Brighter Biometrics)
    viewLogin: function(L) {
        return `
            <div class="h-full flex flex-col p-8 fade-in bg-white">
                <button onclick="Registry.auth.switch('pre-login')" class="mt-4 w-10 h-10 flex items-center justify-center bg-slate-100 rounded-xl text-slate-600 active:scale-90 transition-all"><i data-lucide="chevron-left"></i></button>
                
                <div class="mt-10 mb-8">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Sign In</h2>
                    <p class="text-sm text-slate-500 font-bold mt-2">Enter credentials for secure access</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">User Identifier</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-5 top-1/2 -translate-y-1/2 text-[#004da3]" size="18"></i>
                            <input type="text" placeholder="Mobile / User ID" class="w-full bg-slate-50 border-2 border-slate-100 p-5 pl-14 rounded-[1.25rem] text-sm font-black text-slate-900 shadow-inner outline-none focus:border-[#004da3] transition-all" />
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Security Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 text-[#004da3]" size="18"></i>
                            <input type="password" placeholder="••••••••" class="w-full bg-slate-50 border-2 border-slate-100 p-5 pl-14 rounded-[1.25rem] text-sm font-black text-slate-900 shadow-inner outline-none focus:border-[#004da3] transition-all" />
                        </div>
                    </div>
                </div>

                <!-- Brighter Biometric Icons -->
                <div class="flex items-center justify-center gap-6 mt-10">
                    <button onclick="Registry.auth.handleLogin()" class="w-20 h-20 bg-blue-100 rounded-[2rem] flex items-center justify-center text-[#004da3] border-2 border-blue-200 active:scale-90 transition-all shadow-md">
                        <i data-lucide="scan-face" size="36" stroke-width="2"></i>
                    </button>
                    <button onclick="Registry.auth.handleLogin()" class="w-20 h-20 bg-blue-100 rounded-[2rem] flex items-center justify-center text-[#004da3] border-2 border-blue-200 active:scale-90 transition-all shadow-md">
                        <i data-lucide="fingerprint" size="36" stroke-width="2"></i>
                    </button>
                </div>

                <!-- Brighter PIN Login Shortcut -->
                <div class="mt-8">
                    <button onclick="Registry.auth.switch('login-pin')" class="w-full py-5 bg-slate-100 border-2 border-slate-200 rounded-2xl text-[11px] font-black uppercase text-slate-700 tracking-[0.1em] active:bg-slate-200 transition-colors shadow-sm">
                        Use 6-Digit Access PIN
                    </button>
                </div>

                <div class="mt-10">
                    <button onclick="Registry.auth.handleLogin()" class="w-full bg-[#004da3] text-white py-5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] text-[11px] shadow-xl shadow-blue-200 active:scale-95 transition-transform">Sign In Securely</button>
                    <div class="flex justify-center gap-6 mt-6">
                        <button onclick="Registry.auth.switch('forgot-pin')" class="text-[10px] font-black text-[#2596be] uppercase tracking-widest underline decoration-2 underline-offset-4">Forgot PIN?</button>
                        <button onclick="Registry.auth.switch('forgot-pin')" class="text-[10px] font-black text-[#2596be] uppercase tracking-widest underline decoration-2 underline-offset-4">Need Help?</button>
                    </div>
                </div>
            </div>`;
    },

    // 4. 6-Digit PIN View (Brighter, Visible Buttons)
    viewLoginPIN: function(L) {
        return `
            <div class="h-full flex flex-col p-8 fade-in bg-white">
                <button onclick="Registry.auth.switch('login')" class="mt-4 w-10 h-10 flex items-center justify-center bg-slate-100 rounded-xl text-slate-600 active:scale-90 transition-all"><i data-lucide="chevron-left"></i></button>
                <div class="mt-10 mb-10 text-center">
                    <h2 class="text-2xl font-black text-slate-900">Enter Access PIN</h2>
                    <p class="text-sm text-slate-500 font-bold mt-2">Security check for quick access</p>
                </div>

                <div class="flex justify-center gap-4 mb-12">
                    ${[1,2,3,4,5,6].map(i => `
                        <div class="w-5 h-5 rounded-full border-2 border-slate-200 transition-all ${this.state.pin.length >= i ? 'bg-[#004da3] border-[#004da3] scale-125' : ''}"></div>
                    `).join('')}
                </div>

                <div class="grid grid-cols-3 gap-6 max-w-[280px] mx-auto">
                    ${[1,2,3,4,5,6,7,8,9].map(n => `
                        <button onclick="Registry.auth.handlePIN('${n}')" class="w-16 h-16 rounded-2xl bg-white border-2 border-slate-100 text-2xl font-black text-slate-800 active:bg-[#004da3] active:text-white active:border-[#004da3] transition-all shadow-sm">${n}</button>
                    `).join('')}
                    <button onclick="Registry.auth.state.pin=''" class="w-16 h-16 flex items-center justify-center text-slate-400 active:text-[#dc222a]"><i data-lucide="delete" size="28"></i></button>
                    <button onclick="Registry.auth.handlePIN('0')" class="w-16 h-16 rounded-2xl bg-white border-2 border-slate-100 text-2xl font-black text-slate-800 active:bg-[#004da3] active:text-white transition-all shadow-sm">0</button>
                    <button onclick="Registry.auth.handleLogin()" class="w-16 h-16 flex items-center justify-center text-[#004da3] font-black text-xs uppercase tracking-widest active:scale-110 transition-transform">OK</button>
                </div>
            </div>`;
    },

    // 5. Registration (Account or Card Options)
    viewRegistration: function(L) {
        return `
            <div class="h-full bg-white p-8 flex flex-col fade-in">
                <button onclick="Registry.auth.switch('pre-login')" class="mt-4 w-10 h-10 flex items-center justify-center bg-slate-100 rounded-xl text-slate-600 active:scale-90 transition-all"><i data-lucide="chevron-left"></i></button>
                <div class="mt-10 mb-10 text-center">
                    <h2 class="text-3xl font-black text-slate-900 leading-none tracking-tighter">Get Started</h2>
                    <p class="text-sm text-slate-500 font-bold mt-3 leading-relaxed">Choose your preferred method to verify and link your account.</p>
                </div>
                <div class="space-y-4">
                    <!-- Option 1: Account Number -->
                    <div onclick="Core.navigate('home')" class="p-6 border-2 border-slate-100 rounded-[1.5rem] flex items-center gap-5 hover:border-[#004da3] transition-all cursor-pointer group active:scale-[0.98] shadow-sm bg-slate-50/50">
                        <div class="w-14 h-14 bg-white text-[#004da3] border-2 border-slate-100 rounded-2xl flex items-center justify-center group-hover:bg-[#004da3] group-hover:text-white transition-all shadow-sm"><i data-lucide="user-plus" size="24"></i></div>
                        <div>
                            <h4 class="font-black text-slate-900 text-sm uppercase tracking-tight">${L.regAcc}</h4>
                            <p class="text-[9px] text-slate-500 font-black mt-1 uppercase tracking-widest">${L.regAccSub}</p>
                        </div>
                    </div>

                    <!-- Option 2: Card Details (NEW) -->
                    <div onclick="Core.navigate('home')" class="p-6 border-2 border-slate-100 rounded-[1.5rem] flex items-center gap-5 hover:border-[#004da3] transition-all cursor-pointer group active:scale-[0.98] shadow-sm bg-slate-50/50">
                        <div class="w-14 h-14 bg-white text-[#004da3] border-2 border-slate-100 rounded-2xl flex items-center justify-center group-hover:bg-[#004da3] group-hover:text-white transition-all shadow-sm"><i data-lucide="credit-card" size="24"></i></div>
                        <div>
                            <h4 class="font-black text-slate-900 text-sm uppercase tracking-tight">Card Details</h4>
                            <p class="text-[9px] text-slate-500 font-black mt-1 uppercase tracking-widest">Using DBL Debit/Credit Card</p>
                        </div>
                    </div>
                </div>
                <p class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mt-auto mb-4">Dhaka Bank • Security First</p>
            </div>`;
    },

    // 6. Forgot PIN Flow (Convenience focused)
    viewForgotPIN: function(L) {
        return `
            <div class="h-full bg-white p-8 fade-in flex flex-col">
                <button onclick="Registry.auth.switch('login')" class="mt-4 w-10 h-10 flex items-center justify-center bg-slate-100 rounded-xl text-slate-600 active:scale-90 transition-all"><i data-lucide="chevron-left"></i></button>
                <div class="flex-1 flex flex-col justify-center text-center">
                    <div class="w-20 h-20 bg-rose-50 text-[#dc222a] rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><i data-lucide="lock-keyhole" size="32"></i></div>
                    <h2 class="text-2xl font-black text-slate-900">Forgot Access?</h2>
                    <p class="text-sm text-slate-500 font-semibold mt-3 px-4 leading-relaxed">For your security, PIN resets require a verified OTP. Please enter your mobile number linked with Dhaka Bank.</p>
                    
                    <div class="mt-10 px-4">
                        <input type="text" placeholder="01XXXXXXXXX" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-[1.5rem] font-black text-center text-lg shadow-inner outline-none focus:border-[#004da3]" />
                        <button onclick="alert('OTP Sent for PIN Reset')" class="w-full mt-6 bg-[#004da3] text-white py-5 rounded-[1.5rem] font-black uppercase text-[11px] tracking-widest shadow-xl">Send Reset Code</button>
                    </div>
                </div>
                <p class="text-[9px] font-black text-slate-400 text-center uppercase mb-4 tracking-widest">Contact 16474 for immediate help</p>
            </div>`;
    },

    handlePIN: function(num) {
        if(this.state.pin.length < 6) {
            this.state.pin += num;
            Core.render();
            if(this.state.pin.length === 6) {
                setTimeout(() => this.handleLogin(), 300);
            }
        }
    },

    handleLogin: function() {
        this.state.failedAttempts++;
        // Demo logic: Second attempt/interaction always works
        if (this.state.failedAttempts >= 2) {
            Core.state.isLoggedIn = true;
            this.state.pin = ""; 
            Core.navigate('home');
        } else {
            Core.render();
        }
    },

    content: {
        EN: {
            welcome: "Seamless Convenience", subWelcome: "Banking made secure, simple, and personal.",
            loginBtn: "Secure Sign In", regBtn: "Register Now",
            regAcc: "Bank Account", regAccSub: "Using 13-Digit Account Number",
        },
        BN: {
            welcome: "সহজ এবং নিরাপদ ব্যাংকিং", subWelcome: "আপনার ব্যাংকিং এখন আরও সহজ এবং সুরক্ষিত।",
            loginBtn: "লগইন করুন", regBtn: "নিবন্ধন করুন",
            regAcc: "ব্যাংক অ্যাকাউন্ট", regAccSub: "১৩ ডিজিটের অ্যাকাউন্ট নম্বর দিয়ে",
        }
    }
};

/**
 * M2: HOME / MAIN DASHBOARD MODULE
 * Features: Alternating Greeting (2.5s loop), Compact Navigation Tabs,
 * Growth Bento (e-Rin), High-Visibility Labels, and Image-based CC Promo Slider.
 * Navigation: Global Nav Patch with On-Click Color Shift for Transfer Button and Static Label.
 */
Registry.home = {
    state: {
        view: 'dashboard', // dashboard | loan-form | loan-success | rates | lifestyle-list
        activeCategory: 'accounts',
        balanceVisible: false,
        offerSlide: 0,
        promoSlide: 0,
        greetingPhase: 0, // 0: Time Greeting, 1: Anniversary Msg
        loanData: { amount: 50000, tenure: 12, rate: 9.0 }
    },

    sliderInterval: null,
    promoInterval: null,
    greetingInterval: null,

    setCategory: function(cat) {
        this.state.activeCategory = cat;
        Core.render();
    },

    toggleBalance: function() {
        this.state.balanceVisible = !this.state.balanceVisible;
        Core.render();
    },

    switchView: function(v) {
        this.state.view = v;
        Core.render();
    },

    init: function() {
        // Clear existing intervals to prevent memory leaks or acceleration
        if (this.sliderInterval) clearInterval(this.sliderInterval);
        if (this.promoInterval) clearInterval(this.promoInterval);
        if (this.greetingInterval) clearInterval(this.greetingInterval);
        
        // --- GLOBAL NAV PATCH: Handling elements outside M2 Scope ---
        const navBtn = document.querySelector('[data-page="pay-hub"]');
        if (navBtn) {
            const isActive = Core.currentPage === 'pay-hub';
            
            // Re-styling the Master Core button to support the label and color shift
            navBtn.classList.remove('center-btn'); 
            navBtn.className = 'nav-item flex flex-col items-center justify-center relative';
            navBtn.style.overflow = 'visible';
            
            // Reconstruct HTML: Color shifts on click, Label is static
            navBtn.innerHTML = `
                <div class="w-[58px] h-[58px] rounded-[22px] flex items-center justify-center transition-all duration-300 shadow-lg" 
                     style="margin-top: -38px; color: white; background-color: ${isActive ? '#1e293b' : '#dc222a'};">
                    <i data-lucide="arrow-right-left" size="26"></i>
                </div>
                <span class="text-[9px] font-black mt-1 uppercase tracking-tighter ${isActive ? 'text-[#004da3]' : 'text-slate-600'}">Transfer</span>
            `;
            
            if (window.lucide) window.lucide.createIcons();

            // Toggle logic: If in hub, go home. If home, go hub.
            navBtn.onclick = (e) => {
                e.preventDefault();
                if (Core.currentPage === 'pay-hub') Core.navigate('home');
                else Core.navigate('pay-hub');
            };
        }

        if (this.state.view === 'dashboard') {
            // Alternating Greeting Timer (Every 2.5 seconds)
            this.greetingInterval = setInterval(() => {
                this.state.greetingPhase = (this.state.greetingPhase === 0 ? 1 : 0);
                const greetEl = document.getElementById('dynamic-greeting-text');
                if (greetEl) {
                    greetEl.classList.add('opacity-0');
                    setTimeout(() => {
                        greetEl.innerText = this.getGreeting();
                        greetEl.classList.remove('opacity-0');
                    }, 300);
                }
            }, 2500);

            // Top Hero Slider
            this.sliderInterval = setInterval(() => {
                const track = document.getElementById('promo-slider-track');
                if (track) {
                    this.state.offerSlide = (this.state.offerSlide + 1) % 3;
                    track.style.transform = `translateX(-${this.state.offerSlide * 33.33}%)`;
                }
            }, 4000);

            // Bottom CC Promo Slider
            this.promoInterval = setInterval(() => {
                const track = document.getElementById('cc-promo-track');
                if (track) {
                    this.state.promoSlide = (this.state.promoSlide + 1) % 3;
                    track.style.transform = `translateX(-${this.state.promoSlide * 33.33}%)`;
                }
            }, 5000);
        }
    },

    getGreeting: function() {
        if (this.state.greetingPhase === 1) return "5 Years with Dhaka Bank";
        const hour = new Date().getHours();
        if (hour < 12) return "Good Morning";
        if (hour < 17) return "Good Afternoon";
        return "Good Evening";
    },

    render: function() {
        switch(this.state.view) {
            case 'loan-form': return this.viewLoanForm();
            case 'loan-success': return this.viewLoanSuccess();
            case 'rates': return this.viewRates();
            case 'lifestyle-list': return this.viewLifestyleList();
            default: return this.viewDashboard();
        }
    },

        return `
            <div class="flex flex-col min-h-full pb-32">
                ${this.renderHeader()}
                ${this.renderCategoryTabs()}

                ${this.renderGrowthBento()}
                ${this.renderOffersSlider()}
                ${this.renderQuickPay()}

    initSlider: function() {
        const handle = document.getElementById('pay-handle');
        const track = document.getElementById('pay-track');
        if(!handle || !track) return;
        
        let startX = 0;
        const trackWidth = track.clientWidth - 64;
        
        const move = (clientX) => {
            let diff = clientX - startX;
            if(diff > 0 && diff <= trackWidth) handle.style.transform = `translateX(${diff}px)`;
            if(diff > trackWidth * 0.9) { 
                handle.onmousemove = handle.ontouchmove = null; 
                Registry['pay-hub'].switch('success'); 
            }
        };

        handle.ontouchstart = (e) => startX = e.touches[0].clientX;
        handle.ontouchmove = (e) => move(e.touches[0].clientX);
        
        handle.onmousedown = (e) => {
            startX = e.clientX - (parseInt(handle.style.transform.replace('translateX(', '')) || 0);
            document.onmousemove = (e) => move(e.clientX);
            document.onmouseup = () => { document.onmousemove = null; handle.style.transform = 'translateX(0px)'; };
        };
    }
};

    addNewCard: function() {
        const number = document.getElementById('new-card-num').value || '1111 2222 3333 4444';
        const name = document.getElementById('new-card-name').value || 'M. MASHUD IQBAL';
        const exp = document.getElementById('new-card-exp').value || '12/30';
        
        const brand = number.startsWith('4') ? 'Visa' : 'Mastercard';
        const bg = brand === 'Visa' ? 'bg-gradient-to-br from-indigo-800 to-blue-900' : 'bg-gradient-to-br from-rose-600 to-orange-500';

        this.myCards.push({
            id: Date.now(),
            type: 'Credit',
            brand: brand,
            number: '**** **** **** ' + number.slice(-4),
            fullNumber: number,
            exp: exp,
            name: name.toUpperCase(),
            limit: 100000,
            used: 0,
            nextPaymentDate: 'N/A',
            nextPaymentAmount: 0,
            isActive: true,
            bg: bg
        });

        this.switch('list');
    },

    init: function() {
        if (this.state.view === 'pin-otp') {
            setTimeout(() => {
                const otpInput = document.getElementById('pin-otp-display');
                if (otpInput) otpInput.innerHTML = `<span class="tracking-[0.5em] text-2xl font-black text-[#004da3]">7 2 0 1 9 4</span>`;
                
                setTimeout(() => {
                    if (this.state.actionContext === 'freeze') {
                        // Apply the status change after OTP verification
                        const card = this.myCards.find(c => c.id === this.state.selectedCardId);
                        if (card) card.isActive = !card.isActive;
                        this.switch('pin-success');
                    } else {
                        this.switch('pin-set');
                    }
                }, 1000);
            }, 1500);
        }
    },

    resetState: function() {
        this.state.view = 'list';
        this.state.actionContext = null;
    },

    render: function() {
        switch(this.state.view) {
            case 'list': return this.viewList();
            case 'details': return this.viewDetails();
            case 'add': return this.viewAddCard();
            case 'pin-auth': return this.viewPinAuth();
            case 'pin-otp': return this.viewPinOtp();
            case 'pin-set': return this.viewPinSet();
            case 'pin-success': return this.viewPinSuccess();
            default: return this.viewList();

    initSlider: function() {
        const handle = document.getElementById('prod-handle');
        const track = document.getElementById('prod-track');
        if(!handle || !track) return;
        
        let startX = 0;
        const trackWidth = track.clientWidth - 64;
        
        const move = (clientX) => {
            let diff = clientX - startX;
            if(diff > 0 && diff <= trackWidth) handle.style.transform = `translateX(${diff}px)`;
            if(diff > trackWidth * 0.9) { 
                handle.onmousemove = handle.ontouchmove = null; 
                Registry['product'].switch('success'); 
            }
        };

        handle.ontouchstart = (e) => startX = e.touches[0].clientX;
        handle.ontouchmove = (e) => move(e.touches[0].clientX);
        
        // Mouse support for desktop testing
        handle.onmousedown = (e) => {
            startX = e.clientX - (parseInt(handle.style.transform.replace('translateX(', '')) || 0);
            document.onmousemove = (e) => move(e.clientX);
            document.onmouseup = () => { document.onmousemove = null; handle.style.transform = 'translateX(0px)'; };
        };
    }
};

    },

    initSlider: function() {
        const h = document.getElementById('pay-handle');
        const t = document.getElementById('pay-track');
        if(!h || !t) return;
        let startX = 0;
        const trackWidth = t.clientWidth - 64;
        const move = (clientX) => {
            let diff = clientX - startX;
            if(diff > 0 && diff <= trackWidth) h.style.transform = `translateX(${diff}px)`;
            if(diff > trackWidth * 0.9) { h.onmousemove = h.ontouchmove = null; Registry.payments.switch('success'); }
        };
        h.ontouchstart = (e) => startX = e.touches[0].clientX;
        h.ontouchmove = (e) => move(e.touches[0].clientX);
        h.onmousedown = (e) => {
            startX = e.clientX;
            document.onmousemove = (e) => move(e.clientX);
            document.onmouseup = () => { document.onmousemove = null; h.style.transform = 'translateX(0px)'; };
        };
    }
};

                        </button>
                    </div>

                    <!-- Language Switcher -->
                    <div class="px-8 mb-8">
                        <div class="bg-slate-200/50 p-1.5 rounded-[1.25rem] flex gap-1">
                            <button onclick="Core.toggleLanguage(); setTimeout(() => Core.navigate('more'), 50);" 
                                    class="flex-1 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${Core.state.lang === 'EN' ? 'bg-white text-[#004da3] shadow-sm' : 'text-slate-400'}">
                                English
                            </button>
                            <button onclick="Core.toggleLanguage(); setTimeout(() => Core.navigate('more'), 50);" 
                                    class="flex-1 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${Core.state.lang === 'BN' ? 'bg-white text-[#004da3] shadow-sm' : 'text-slate-400'}">
                                বাংলা
                            </button>
                        </div>
                    </div>

                    <!-- Scrollable List -->
                    <div class="flex-1 overflow-y-auto no-scrollbar px-8 space-y-2 pb-10">
                        ${menuItems.map(item => `
                            <div onclick="${item.action}" class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-50 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-all">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-blue-50 text-[#004da3] flex items-center justify-center shrink-0">
                                        <i data-lucide="${item.icon}" size="18"></i>
                                    </div>
                                    <span class="text-xs font-bold text-slate-700 uppercase tracking-tight">${item.label}</span>
                                </div>
                                <i data-lucide="chevron-right" size="16" class="text-slate-300"></i>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Footer Action -->
                    <div class="px-8 pt-6 border-t border-slate-100 mt-auto bg-[#f8fafc]">
                        <button onclick="Registry.more.handleLogout()" class="w-full bg-rose-50 text-rose-600 py-5 rounded-[1.5rem] font-black uppercase tracking-[0.1em] text-[11px] flex items-center justify-center gap-3 active:scale-95 transition-transform shadow-sm">
                            <i data-lucide="log-out" size="18"></i> Secure Logout
                        </button>
                        <p class="text-center text-[8px] font-bold text-slate-300 uppercase tracking-widest mt-6 pb-2">Dhaka Bank • Go Plus v2.6.0</p>
                    </div>
                </div>
            </div>
        `;
    }
};
        
        // --- END REGISTRY ---

        // Boot system
        window.onload = () => {
            // Set dynamic time
            const now = new Date();
            document.getElementById('system-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            Core.render();
        };
    </script>
</body>
</html>
